name: DevDigest Daily Email

on:
  schedule:
    # Run at 7am IST (1:30am UTC) daily
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - error

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Create appsettings.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
        run: |
          cat > src/DevDigest.App/appsettings.json << EOF
          {
            "Digest": {
              "ToEmail": "${{ vars.DIGEST_TO_EMAIL }}",
              "MaxItemsPerCategory": 10,
              "Categories": [
                {
                  "Name": "HLD",
                  "Enabled": true,
                  "Sources": [
                    "https://devblogs.microsoft.com/visualstudio/feed/",
                    "https://aws.amazon.com/blogs/architecture/feed/"
                  ]
                },
                {
                  "Name": "DSA",
                  "Enabled": true,
                  "Sources": [
                    "https://cp-algorithms.com/rss.xml"
                  ]
                },
                {
                  "Name": "Tech News",
                  "Enabled": true,
                  "Sources": [
                    "https://hacker-news.firebaseio.com/v0/topstories.json"
                  ]
                },
                {
                  "Name": "GitHub Trends",
                  "Enabled": true,
                  "Sources": [
                    "https://github-trending-api.43z.win/atom"
                  ]
                }
              ]
            },
            "OpenAI": {
              "ApiKey": "$OPENAI_API_KEY",
              "Model": "gpt-4o-mini"
            },
            "Graph": {
              "ClientId": "$GRAPH_CLIENT_ID"
            },
            "Email": {
              "SmtpHost": "smtp.office365.com",
              "SmtpPort": 587,
              "Username": "$EMAIL_USERNAME",
              "Password": "$EMAIL_PASSWORD"
            }
          }
          EOF

      - name: Restore dependencies
        run: dotnet restore src/DevDigest.App/DevDigest.App.csproj

      - name: Build
        run: dotnet build src/DevDigest.App/DevDigest.App.csproj --configuration Release --no-restore

      - name: Run DevDigest
        run: dotnet run --project src/DevDigest.App/DevDigest.App.csproj --configuration Release