name: DevDigest Daily Email

on:
  schedule:
    # Run at 7am IST (1:30am UTC) daily
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - error

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Create appsettings.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ vars.SENDGRID_FROM_EMAIL }}
        run: |
          cat > src/DevDigest.App/appsettings.json << EOF
          {
            "Digest": {
              "ToEmail": "${{ vars.DIGEST_TO_EMAIL }}",
              "MaxItemsPerCategory": 8,
              "Categories": [
                {
                  "Name": "🏗️ Architecture & System Design",
                  "Enabled": true,
                  "Sources": [
                    "https://devblogs.microsoft.com/visualstudio/feed/",
                    "https://aws.amazon.com/blogs/architecture/feed/",
                    "https://martinfowler.com/feed.rss"
                  ]
                },
                {
                  "Name": "🧮 Algorithms & Problem Solving",
                  "Enabled": true,
                  "Sources": [
                    "https://cp-algorithms.com/rss.xml"
                  ]
                },
                {
                  "Name": "📰 Tech News & Trends",
                  "Enabled": true,
                  "Sources": [
                    "https://hacker-news.firebaseio.com/v0/topstories.json",
                    "https://dev.to/feed"
                  ]
                },
                {
                  "Name": "🔥 Trending on GitHub",
                  "Enabled": true,
                  "Sources": [
                    "https://github-trending-api.43z.win/atom"
                  ]
                },
                {
                  "Name": "🎨 Frontend & Web Dev",
                  "Enabled": true,
                  "Sources": [
                    "https://css-tricks.com/feed/",
                    "https://javascriptweekly.com/issues"
                  ]
                }
              ]
            },
            "OpenAI": {
              "ApiKey": "$OPENAI_API_KEY",
              "Model": "gpt-4o-mini"
            },
            "SendGrid": {
              "ApiKey": "$SENDGRID_API_KEY",
              "FromEmail": "$SENDGRID_FROM_EMAIL"
            }
          }
          EOF

      - name: Restore dependencies
        run: dotnet restore src/DevDigest.App/DevDigest.App.csproj

      - name: Build
        run: dotnet build src/DevDigest.App/DevDigest.App.csproj --configuration Release --no-restore

      - name: Run DevDigest
        run: dotnet run --project src/DevDigest.App/DevDigest.App.csproj --configuration Release